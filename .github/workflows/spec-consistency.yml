name: Spec Consistency

on:
  push:
  pull_request:

jobs:
  spec-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install lint dependencies
        run: pip install -r requirements-dev.txt

      - name: Run spec consistency check
        run: python3 scripts/check_spec_consistency.py

      - name: Check data_access_level declarations
        env:
          PYTHONPATH: scripts
        run: python3 scripts/check_data_access_level.py

      - name: Check task_type declarations
        env:
          PYTHONPATH: scripts
        run: python3 scripts/check_task_type.py

      - name: Check repro_lock declarations
        env:
          PYTHONPATH: scripts
        run: |
          for passport in examples/*/passport*.yaml; do
            python3 scripts/check_repro_lock.py "$passport" || exit 1
          done
          # If no passports found, verify check_repro_lock works in opt-out mode
          echo "repro_lock: null" | python3 scripts/check_repro_lock.py /dev/stdin
